services:
  - type: web
    name: vid2pdf
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 300 --worker-class gthread"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
